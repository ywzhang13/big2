<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="300" height="400" viewBox="0 0 300 400">
  <!-- Tile base (matching the set's style) -->
  <rect x="5" y="5" width="290" height="390" rx="20" fill="#f5f0e0" stroke="#b0a080" stroke-width="3"/>
  <rect x="15" y="15" width="270" height="370" rx="14" fill="#faf7ee" stroke="#d8d0b8" stroke-width="1"/>
  <!-- Flower character -->
  <text x="150" y="240" text-anchor="middle" dominant-baseline="central" font-size="160" font-weight="900" font-family="serif" fill="#0066cc">冬</text>
  <!-- Small number indicator -->
  <text x="40" y="60" text-anchor="middle" font-size="40" font-weight="700" font-family="serif" fill="#0066cc">5</text>
</svg>
